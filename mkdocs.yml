site_name: GCES KDE Linux Relatórios
theme:
  name: material
  language: pt-BR
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: light blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Modo claro

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Geral:
    - Sprint 0: sprint0.md
    - Sprint 1: sprint1.md
    - Sprint 2: sprint2.md
    - Sprint 3: sprint3.md
    - Sprint 4: sprint4.md
    - Sprint 5: sprint5.md
