    - Victório Lázaro: contribuicoes_individuais/victoriolazaro/diarioDeBordo.md
    - João Pedro: contribuicoes_individuais/joaopedro/diarioDeBordo.md
    - Diego Carlito: contribuicoes_individuais/diegocarlito/diarioDeBordo.md
